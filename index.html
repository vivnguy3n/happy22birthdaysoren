<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Happy Birthday</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="photo-collage">
<img src="photo1.JPG" class="photo" alt="">
<img src="photo2.JPG" class="photo" alt="">
<img src="photo3.JPG" class="photo" alt="">
<img src="photo4.JPG" class="photo" alt="">
<img src="photo5.JPG" class="photo" alt="">
<img src="photo6.JPG" class="photo" alt="">
<img src="photo7.JPG" class="photo" alt="">
<img src="photo8.JPG" class="photo" alt="">
<img src="photo9.JPG" class="photo" alt="">
<img src="photo10.JPG" class="photo" alt="">
<img src="photo11.JPG" class="photo" alt="">
<img src="photo12.JPG" class="photo" alt="">
</div>

<main class="container">
<div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open birthday envelope">
<div class="click-hint">click me 💌</div>

<div class="envelope-back"></div>

<div class="letter">
<h2 id="message"></h2>
</div>

<div class="envelope-front"></div>
<div class="flap"></div>

<img src="sticker.png" class="sticker" alt="Envelope sticker">
</div>
</main>

<script src="script.js"></script>
</body>
</html>
